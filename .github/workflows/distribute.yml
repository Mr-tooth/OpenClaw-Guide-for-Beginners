name: 内容分发

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: '分发到指定平台 (all/zhihu/xiaohongshu/wechat/juejin)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - zhihu
          - xiaohongshu
          - wechat
          - juejin

jobs:
  distribute:
    runs-on: ubuntu-latest
    name: 生成各平台内容版本
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install markdown2 beautifulsoup4
      
      - name: 生成所有平台版本
        if: github.event.inputs.platform == 'all' || github.event.inputs.platform == ''
        run: |
          python3 scripts/distribute/distribute.py all
      
      - name: 生成指定平台版本
        if: github.event.inputs.platform != 'all' && github.event.inputs.platform != ''
        run: |
          python3 scripts/distribute/distribute.py ${{ github.event.inputs.platform }}
      
      - name: 查看分发报告
        run: |
          if [ -f dist/distribution-report.json ]; then
            cat dist/distribution-report.json
          fi
      
      - name: 提交分发生成的文件
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add dist/
          git diff --staged --quiet || git commit -m "📦 自动生成平台分发版本"
          git push